spring.application.name=cinema-monarca
server.port=${PORT:8080}

# ── MySQL Railway ──
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Hikari Pool ──
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── Jackson ──
spring.jackson.default-property-inclusion=non_null

# ── SQL init ──
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# ── JWT ──
app.jwt.secret=CinemaMonarcaSecretKeyMustBe32CharsLongABC
app.jwt.expiration-ms=86400000

# ── CORS ──
spring.web.cors.allowed-origins=*

# ── Logging ──
logging.level.com.cinemamonarca=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ── Swagger UI ──
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
# ── Upload poster (JSON base64 ~2MB → permite hasta 4MB en el request) ──
spring.servlet.multipart.max-file-size=4MB
spring.servlet.multipart.max-request-size=4MB
server.tomcat.max-http-form-post-size=5MB