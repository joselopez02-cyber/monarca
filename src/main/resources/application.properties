spring.application.name=cinema-monarca
server.port=8080

# ── MySQL ──
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Hikari Pool ──
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# ── JPA / Hibernate ──
# ddl-auto=update genera el ALTER TABLE IF EXISTS que no soporta MySQL 5.x
# Con 'validate' solo verifica sin modificar — elimina el error de sintaxis
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# FIX: quitar MariaDBDialect — usar MySQL8Dialect que si soporta la sintaxis correcta
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── Jackson ──
# FIX: Spring Boot 4 usa Jackson 3 — las propiedades cambiaron de nombre
# NO usar: spring.jackson.serialization.write-dates-as-timestamps (no existe en Jackson 3)
# NO usar: spring.jackson.serialization.fail-on-empty-beans (nombre cambio)
spring.jackson.default-property-inclusion=non_null

# ── SQL init ──
spring.sql.init.mode=never

# ── JWT ──
app.jwt.secret=CinemaMonarcaSecretKeyMustBe32CharsLongABC
app.jwt.expiration-ms=86400000

# ── CORS ──
spring.web.cors.allowed-origins=*

# ── Logging ──
logging.level.com.cinemamonarca=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ── Swagger UI ──
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
