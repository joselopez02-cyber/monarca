# CONFIGURACIÓN GENERAL - CINEMA MONARCA
spring.application.name=cinema-monarca

# PUERTO DINÁMICO (Local: 8080 / Railway: Asignado por el sistema)
server.port=${PORT:8080}

# CONFIGURACIÓN DE BASE DE DATOS (PERSISTENTE EN ARCHIVO)
# NOTA: En Railway la ruta debe ser /app/db/ para que coincida con el volumen.
# Localmente, IntelliJ creará la carpeta /app/db en la raíz de tu disco (C:/app/db).
spring.datasource.url=jdbc:h2:file:/app/db/monarcadb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# CONSOLA H2 (Acceso en /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Necesario para que Railway permita el acceso externo a la consola
spring.h2.console.settings.web-allow-others=true

# JPA / HIBERNATE
# 'update' mantiene tus datos y solo sincroniza cambios en las clases Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CONFIGURACIÓN DE SWAGGER / OPENAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# SEGURIDAD Y COMPATIBILIDAD
# Crucial para que Railway no bloquee la interfaz de la consola H2
spring.queries.roles-query=select username, role from users where username=?
spring.main.allow-bean-definition-overriding=true

# ESTAS LÍNEAS SON LAS QUE EVITAN EL ERROR "NOT FOUND" Y PANTALLA EN BLANCO
spring.security.frame-options.disable=true
server.servlet.context-path=/
spring.mvc.pathmatch.matching-strategy=ant_path_matcher