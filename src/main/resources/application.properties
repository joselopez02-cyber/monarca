spring.application.name=cinema-monarca
server.port=${PORT:8080}

# ── MySQL Railway ──
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Hikari Pool (reducido para Railway plan estudiante ~512MB) ──
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.pool-name=MonarcaPool

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=false

# ── Jackson ──
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# ── SQL init ──
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# ── JWT ──
app.jwt.secret=CinemaMonarcaSecretKeyMustBe32CharsLongABC
app.jwt.expiration-ms=86400000

# ── CORS ──
spring.web.cors.allowed-origins=*

# ── Logging minimo (ahorra CPU y RAM) ──
logging.level.root=WARN
logging.level.com.cinemamonarca=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN

# ── HTTPS / Proxy headers Railway ──
server.forward-headers-strategy=framework

# ── Swagger UI ──
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.show-actuator=false

# ── Upload ──
spring.servlet.multipart.max-file-size=4MB
spring.servlet.multipart.max-request-size=4MB
server.tomcat.max-http-form-post-size=5MB

# ── Tomcat (hilos minimos para ahorrar RAM) ──
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=2
server.tomcat.accept-count=10

# ── Compresion HTTP ──
server.compression.enabled=true
server.compression.mime-types=application/json,application/javascript,text/css,text/html
server.compression.min-response-size=1024

# ── Cache de recursos estaticos ──
spring.web.resources.cache.period=604800
spring.web.resources.cache.cachecontrol.max-age=604800