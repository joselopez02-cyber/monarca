spring.application.name=cinema-monarca

# PUERTO DINÁMICO
server.port=${PORT:8080}

# PERFIL ACTIVO
spring.profiles.active=prod

# CONEXIÓN A LA BASE DE DATOS (Ajustada a tus credenciales reales)
# Usamos la URL pública como respaldo para cuando trabajes en local
spring.datasource.url=${MYSQL_URL:jdbc:mysql://metro.proxy.rlwy.net:21244/railway}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:msPDHBYDfRaLulDQMjiAKpfBdBYpierI}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CONFIGURACIÓN DE JPA / HIBERNATE
